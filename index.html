<!doctype html>
<html lang="th">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบวัดระดับน้ำมัน</title>
  <style>

</head>
<body>
  <main class="app">
    <header class="header">
      <div class="eyebrow">ระบบวัดระดับน้ำมัน</div>
      <h1>สถานีบริการน้ำมัน</h1>
      <div class="subtitle">กรอกระดับ (ซ.ม.) ของแต่ละถัง</div>
    </header>
    <section id="tankList" class="tank-list"></section>
    <div class="buttons">
      <button id="calculateBtn" class="calculate" type="button">คำนวณและแสดงกราฟ</button>
      <button id="resetBtn" class="reset" type="button">ล้าง</button>
    </div>
    <section id="chartPanel" class="panel">
      <div class="panel-title">ปริมาณน้ำมันในถัง</div>
      <div class="panel-subtitle">เปรียบเทียบแต่ละถัง (ลิตร)</div>
      <div id="bars" class="bars"></div>
    </section>
    <section id="summary" class="summary">
      <div class="summary-label">รวมน้ำมันทั้งสถานี</div>
      <div class="summary-total"><span id="totalVol">0</span><span>ลิตร</span></div>
      <div class="summary-track"><div id="summaryFill" class="summary-fill"></div></div>
      <div class="summary-foot"><span id="totalCap"></span><span id="totalPct"></span></div>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>
  </main>

  <script>

      T2:[[1,200,10.6],[2,400,17.4],[3,600,23.1],[4,800,28.3],[5,1000,33.1],[6,1200,37.6],[7,1400,41.9],[8,1600,46.1],[9,1800,50.2],[10,2000,54.3],[11,2200,58.1],[12,2400,61.9],[13,2600,65.6],[14,2800,69.2],[15,3000,72.7],[16,3200,76.2],[17,3400,79.6],[18,3600,83.1],[19,3800,86.8],[20,4000,90.2],[21,4200,93.7],[22,4400,97.2],[23,4600,100.5],[24,4800,103.9],[25,5000,107.2],[26,5200,110.5],[27,5400,113.8],[28,5600,117.1],[29,5800,120.4],[30,6000,123.8],[31,6200,127.1],[32,6400,130.5],[33,6600,133.9],[34,6800,137.1],[35,7000,140.4],[36,7200,143.8],[37,7400,147.1],[38,7600,150.4],[39,7800,153.7],[40,8000,157.2],[41,8200,160.7],[42,8400,164.2],[43,8600,167.8],[44,8800,171.4],[45,9000,175],[46,9200,178.8],[47,9400,182.5],[48,9600,186.1],[49,9800,190.5],[50,10000,195]],
      T3:[[1,200,10.5],[2,400,17.3],[3,600,23],[4,800,28.2],[5,1000,33],[6,1200,37.5],[7,1400,41.8],[8,1600,46],[9,1800,50],[10,2000,54],[11,2200,57.8],[12,2400,61.6],[13,2600,65.3],[14,2800,68.9],[15,3000,72.5],[16,3200,75.9],[17,3400,79.1],[18,3600,82.6],[19,3800,86.1],[20,4000,89.7],[21,4200,93],[22,4400,96.5],[23,4600,99.8],[24,4800,103.1],[25,5000,106.1],[26,5200,109.4],[27,5400,112.7],[28,5600,115.8],[29,5800,119.1],[30,6000,122.5],[31,6200,125.7],[32,6400,128.9],[33,6600,132.3],[34,6800,135.5],[35,7000,138.8],[36,7200,142.2],[37,7400,145.5],[38,7600,148.8],[39,7800,152.1],[40,8000,155.6],[41,8200,159.1],[42,8400,162.6],[43,8600,166.2],[44,8800,169.8],[45,9000,173.4],[46,9200,177.2],[47,9400,180.9],[48,9600,184.5],[49,9800,188.8],[50,10000,193.2]],
      T4:[[1,200,4.3],[2,400,7.7],[3,600,10.4],[4,800,12.8],[5,1000,15.1],[6,1200,17.2],[7,1400,19.3],[8,1600,21.2],[9,1800,23.1],[10,2000,24.9],[11,2200,26.7],[12,2400,28.4],[13,2600,30],[14,2800,31.6],[15,3000,33.3],[16,3200,34.9],[17,3400,36.4],[18,3600,37.9],[19,3800,39.4],[20,4000,40.8],[21,4200,42.3],[22,4400,43.8],[23,4600,45.1],[24,4800,46.4],[25,5000,47.8],[26,5200,49.2],[27,5400,50.5],[28,5600,51.8],[29,5800,53.1],[30,6000,54.4],[31,6200,55.7],[32,6400,57],[33,6600,58.3],[34,6800,59.5],[35,7000,60.7],[36,7200,61.9],[37,7400,63.2],[38,7600,64.5],[39,7800,65.8],[40,8000,67],[41,8200,68.2],[42,8400,69.3],[43,8600,70.4],[44,8800,71.6],[45,9000,72.9],[46,9200,74.2],[47,9400,75.5],[48,9600,76.7],[49,9800,77.8],[50,10000,78.9],[51,10200,80.1],[52,10400,81.3],[53,10600,82.5],[54,10800,83.7],[55,11000,84.9],[56,11200,86.1],[57,11400,87.3],[58,11600,88.4],[59,11800,89.5],[60,12000,90.7],[61,12200,91.9],[62,12400,93],[63,12600,94.1],[64,12800,95.2],[65,13000,96.3],[66,13200,97.4],[67,13400,98.5],[68,13600,99.6],[69,13800,100.7],[70,14000,101.8],[71,14200,102.9],[72,14400,104],[73,14600,105.1],[74,14800,106.2],[75,15000,107.3],[76,15200,108.4],[77,15400,109.5],[78,15600,110.7],[79,15800,111.9],[80,16000,113.1],[81,16200,114.2],[82,16400,115.3],[83,16600,116.5],[84,16800,117.6],[85,17000,118.7],[86,17200,119.9],[87,17400,121],[88,17600,122.2],[89,17800,123.3],[90,18000,124.4],[91,18200,125.5],[92,18400,126.7],[93,18600,127.8],[94,18800,128.9],[95,19000,130.1],[96,19200,131.3],[97,19400,132.5],[98,19600,133.6],[99,19800,134.7],[100,20000,135.8],[101,20200,137],[102,20400,138.2],[103,20600,139.3],[104,20800,140.4],[105,21000,141.5],[106,21200,142.6],[107,21400,143.8],[108,21600,144.9],[109,21800,146.1],[110,22000,147.2],[111,22200,148.3],[112,22400,149.5],[113,22600,150.7],[114,22800,151.9],[115,23000,153],[116,23200,154.2],[117,23400,155.4],[118,23600,156.5],[119,23800,157.7],[120,24000,158.8],[121,24200,159.9],[122,24400,161.1],[123,24600,162.4],[124,24800,163.6],[125,25000,164.9],[126,25200,166.2],[127,25400,167.5],[128,25600,168.8],[129,25800,170.1],[130,26000,171.4],[131,26200,172.7],[132,26400,174],[133,26600,175.3],[134,26800,176.5],[135,27000,177.8],[136,27200,179.1],[137,27400,180.4],[138,27600,181.7],[139,27800,183],[140,28000,184.3],[141,28200,185.6],[142,28400,186.8],[143,28600,188.1],[144,28800,190.1],[145,29000,191.5],[146,29200,193],[147,29400,194.4],[148,29600,195.7],[149,29800,197.1],[150,30000,198.8]]
    };
    const TANKS=[
      {id:"T1",fuel:"G95",cap:10000,color:"#f59e0b",light:"#fef9c3",maxLevel:204.5},
      {id:"T2",fuel:"E20",cap:10000,color:"#3b82f6",light:"#dbeafe",maxLevel:195},
      {id:"T3",fuel:"B20",cap:10000,color:"#22c55e",light:"#dcfce7",maxLevel:193.2},
      {id:"T4",fuel:"D",cap:30000,color:"#ef4444",light:"#fee2e2",maxLevel:198.8}
    ];
    const state={volumes:{T1:null,T2:null,T3:null,T4:null},errors:{T1:false,T2:false,T3:false,T4:false},calculated:false,animated:false,timer:null};
    const tankList=document.getElementById("tankList"),chartPanel=document.getElementById("chartPanel"),bars=document.getElementById("bars"),summary=document.getElementById("summary"),totalVolEl=document.getElementById("totalVol"),totalCapEl=document.getElementById("totalCap"),totalPctEl=document.getElementById("totalPct"),summaryFill=document.getElementById("summaryFill"),summaryGrid=document.getElementById("summaryGrid"),maxScale=30000;
    const fmt=n=>n.toLocaleString("th-TH");
    const getPct=(vol,cap)=>Math.min(100,vol/cap*100);
    function interpolate(tid,level){const table=TABLES[tid];if(level<=0)return 0;if(level>=table[table.length-1][2])return table[table.length-1][1];const exact=table.find(r=>Math.abs(r[2]-level)<.001);if(exact)return exact[1];for(let i=0;i<table.length-1;i++){if(table[i][2]<=level&&table[i+1][2]>=level){const ratio=(level-table[i][2])/(table[i+1][2]-table[i][2]);return Math.round(table[i][1]+ratio*(table[i+1][1]-table[i][1]))}}return 0}
    function getStatus(pct){if(pct>=70)return{label:"ปกติ",bg:"#dcfce7",text:"#15803d",fill:"#22c55e"};if(pct>=30)return{label:"กลาง",bg:"#fef9c3",text:"#a16207",fill:"#f59e0b"};return{label:"ต่ำ",bg:"#fee2e2",text:"#b91c1c",fill:"#ef4444"}}
    function hasAnyResult(){return Object.values(state.volumes).some(v=>v!==null)}
    function renderInputs(){const old={};TANKS.forEach(t=>{const el=document.getElementById(`input-${t.id}`);old[t.id]=el?el.value:""});tankList.innerHTML=TANKS.map(t=>{const v=state.volumes[t.id],err=state.errors[t.id],levelStatus=v!==null?getStatus(getPct(v,t.cap)):null;return `<article class="tank-card ${err?"error":""}" data-tank="${t.id}"><div class="tank-badge" style="background:${t.light}"><span class="tank-label" style="color:${t.color}">${t.id}</span><span class="fuel-label" style="color:${t.color}">${t.fuel}</span></div><div class="tank-info"><div class="tank-meta">ความจุ ${fmt(t.cap)} ลิตร · สูงสุด ${t.maxLevel} ซ.ม.</div><div class="input-row"><input id="input-${t.id}" type="number" inputmode="decimal" placeholder="0.0" min="0" max="${t.maxLevel}" step="0.1" value="${old[t.id]||""}" aria-label="ระดับน้ำมัน ${t.id} ${t.fuel}"><span class="unit">ซ.ม.</span></div>${err?`<div class="error-text">ค่าต้องอยู่ระหว่าง 0 - ${t.maxLevel}</div>`:""}</div>${v!==null?`<div class="inline-result"><div class="inline-liters" style="color:${t.color}">${fmt(v)}</div><div class="inline-unit">ลิตร</div></div>`:""}</article>`}).join("");TANKS.forEach(t=>{const input=document.getElementById(`input-${t.id}`);input.addEventListener("input",()=>{state.errors[t.id]=false;const card=document.querySelector(`[data-tank="${t.id}"]`);card.classList.remove("error");const msg=card.querySelector(".error-text");if(msg)msg.remove()});input.addEventListener("keydown",e=>{if(e.key==="Enter")calculate()})})}
    function renderResults(){const show=state.calculated&&hasAnyResult();chartPanel.classList.toggle("visible",show);summary.classList.toggle("visible",show);if(!show){bars.innerHTML="";summaryGrid.innerHTML="";return}bars.innerHTML=TANKS.map(t=>{const vol=state.volumes[t.id];if(vol===null)return"";const pct=getPct(vol,t.cap),barPct=pct,status=getStatus(pct),inside=vol>0&&barPct>12?`${pct.toFixed(0)}%`:"";return `<div><div class="bar-head"><div class="bar-name"><span class="color-dot" style="background:${t.color}"></span><span class="tank-name">${t.id} (${t.fuel})</span><span class="status" style="background:${status.bg};color:${status.text}">${status.label}</span></div><div class="bar-value"><span class="bar-liters" style="color:${t.color}">${fmt(vol)}</span><span class="unit"> ลิตร</span></div></div><div class="bar-track"><div class="capacity-marker" style="left:100%;transform:translateX(-2px)"></div><div class="bar-fill" style="background:${t.color};width:${state.animated?barPct:0}%;min-width:${vol>0?"36px":"0"}">${inside}</div></div><div class="bar-foot"><span>0</span><span>ความจุ ${fmt(t.cap)} ลิตร (${pct.toFixed(1)}%)</span></div></div>`}).join("");const totalVol=Object.values(state.volumes).reduce((sum,v)=>sum+(v||0),0),totalCap=TANKS.reduce((sum,t)=>sum+t.cap,0),totalPct=getPct(totalVol,totalCap);totalVolEl.textContent=fmt(totalVol);totalCapEl.textContent=`ความจุรวม ${fmt(totalCap)} ลิตร`;totalPctEl.textContent=`${totalPct.toFixed(1)}%`;summaryFill.style.width=state.animated?`${totalPct.toFixed(1)}%`:"0%";summaryGrid.innerHTML=TANKS.map(t=>{const vol=state.volumes[t.id];if(vol===null)return"";return `<div class="summary-tank"><div class="summary-tank-label">${t.id} · ${t.fuel}</div><div class="summary-tank-value">${fmt(vol)} ลิตร</div><div class="summary-tank-percent">${getPct(vol,t.cap).toFixed(0)}% ของถัง</div></div>`}).join("")}
    function calculate(){const volumes={},errors={};let hasError=false,allEmpty=true;TANKS.forEach(t=>{const raw=document.getElementById(`input-${t.id}`).value;if(raw===""){volumes[t.id]=null;errors[t.id]=false;return}allEmpty=false;const level=parseFloat(raw);if(Number.isNaN(level)||level<0||level>t.maxLevel){errors[t.id]=true;volumes[t.id]=null;hasError=true}else{errors[t.id]=false;volumes[t.id]=interpolate(t.id,level)}});state.volumes=volumes;state.errors=errors;state.animated=false;if(!hasError&&!allEmpty){state.calculated=true;clearTimeout(state.timer);state.timer=setTimeout(()=>{state.animated=true;renderResults()},60)}renderInputs();renderResults()}
    function reset(){state.volumes={T1:null,T2:null,T3:null,T4:null};state.errors={T1:false,T2:false,T3:false,T4:false};state.calculated=false;state.animated=false;clearTimeout(state.timer);renderInputs();renderResults()}
    document.getElementById("calculateBtn").addEventListener("click",calculate);
    document.getElementById("resetBtn").addEventListener("click",reset);
    renderInputs();
  </script>
</body>
</html>
