<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบวัดระดับน้ำมัน</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f8fafc;color:#0f172a;font-family:Arial,Tahoma,sans-serif}.app{max-width:420px;margin:0 auto;padding:16px 14px 40px}.header{margin-bottom:20px}.eyebrow{font-size:11px;font-weight:500;letter-spacing:2px;color:#94a3b8;text-transform:uppercase;margin-bottom:4px}h1{font-size:22px;font-weight:600;line-height:1.2;margin:0}.subtitle{font-size:13px;color:#64748b;margin-top:4px}.tank-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}.tank-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.tank-card.error{border-color:#fca5a5;box-shadow:0 0 0 3px #fecaca}.tank-badge{min-width:52px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}.tank-label{font-size:14px;font-weight:700}.fuel-label{font-size:10px;font-weight:600;opacity:.8}.tank-info{flex:1;min-width:0}.tank-meta{font-size:12px;color:#94a3b8;margin-bottom:4px}.input-row{display:flex;align-items:center;gap:6px}input{width:100%;font-size:18px;font-weight:600;padding:6px 10px;border-radius:8px;border:1.5px solid #e2e8f0;color:#0f172a;background:#f8fafc;outline:none}.tank-card.error input{border-color:#f87171}.unit{font-size:12px;color:#94a3b8;white-space:nowrap}.error-text{font-size:11px;color:#ef4444;margin-top:3px}.inline-result{text-align:right;min-width:64px}.inline-liters{font-size:16px;font-weight:700}.inline-unit{font-size:10px;color:#94a3b8}.buttons{display:flex;gap:8px;margin-bottom:24px}button{padding:13px 0;border:none;border-radius:12px;cursor:pointer;font-family:inherit}.calculate{flex:3;font-size:15px;font-weight:600;background:#1e40af;color:#fff;letter-spacing:.3px}.reset{flex:1;font-size:14px;font-weight:500;background:#f1f5f9;color:#475569}.panel{display:none;background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:18px 16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}.panel.visible,.summary.visible{display:block}.panel-title{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:2px}.panel-subtitle{font-size:11px;color:#94a3b8;margin-bottom:20px}.bars{display:flex;flex-direction:column;gap:16px}.bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}.bar-name{display:flex;align-items:center;gap:8px;min-width:0}.color-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}.tank-name{font-size:13px;font-weight:600;color:#0f172a;white-space:nowrap}.status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;white-space:nowrap}.bar-value{text-align:right;flex:0 0 auto}.bar-liters{font-size:14px;font-weight:700}.bar-track{position:relative;height:28px;background:#f1f5f9;border-radius:8px;overflow:hidden}.capacity-marker{position:absolute;top:0;bottom:0;width:2px;background:#cbd5e1;z-index:2}.bar-fill{position:absolute;top:0;left:0;bottom:0;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;transition:width .7s cubic-bezier(.34,1.56,.64,1)}.bar-foot{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:#94a3b8}.summary{display:none;background:#1e40af;border-radius:16px;padding:16px 18px;color:#fff}.summary-label{font-size:12px;opacity:.7;margin-bottom:4px}.summary-total{font-size:28px;font-weight:700}.summary-total span{font-size:14px;font-weight:400;margin-left:6px;opacity:.8}.summary-track{margin-top:12px;background:rgba(255,255,255,.15);border-radius:8px;height:8px;overflow:hidden}.summary-fill{height:100%;width:0;background:#fff;border-radius:8px;transition:width .9s cubic-bezier(.34,1.56,.64,1) .2s}.summary-foot{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;opacity:.7}.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.summary-tank{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 10px}.summary-tank-label,.summary-tank-percent{font-size:10px;opacity:.7}.summary-tank-value{font-size:14px;font-weight:700}
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="eyebrow">ระบบวัดระดับน้ำมัน</div>
      <h1>สถานีบริการน้ำมัน</h1>
      <div class="subtitle">กรอกระดับ (ซ.ม.) ของแต่ละถัง</div>
    </header>
    <section id="tankList" class="tank-list"></section>
    <div class="buttons">
      <button id="calculateBtn" class="calculate" type="button">คำนวณและแสดงกราฟ</button>
      <button id="resetBtn" class="reset" type="button">ล้าง</button>
    </div>
    <section id="chartPanel" class="panel">
      <div class="panel-title">ปริมาณน้ำมันในถัง</div>
      <div class="panel-subtitle">เปรียบเทียบแต่ละถัง (ลิตร)</div>
      <div id="bars" class="bars"></div>
    </section>
    <section id="summary" class="summary">
      <div class="summary-label">รวมน้ำมันทั้งสถานี</div>
      <div class="summary-total"><span id="totalVol">0</span><span>ลิตร</span></div>
      <div class="summary-track"><div id="summaryFill" class="summary-fill"></div></div>
      <div class="summary-foot"><span id="totalCap"></span><span id="totalPct"></span></div>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>
  </main>

  <script>
    const TABLE=[[1,200,4.3],[2,400,7.7],[3,600,10.4],[4,800,12.8],[5,1000,15.1],[6,1200,17.2],[7,1400,19.3],[8,1600,21.2],[9,1800,23.1],[10,2000,24.9],[11,2200,26.7],[12,2400,28.4],[13,2600,30],[14,2800,31.6],[15,3000,33.3],[16,3200,34.9],[17,3400,36.4],[18,3600,37.9],[19,3800,39.4],[20,4000,40.8],[21,4200,42.3],[22,4400,43.8],[23,4600,45.1],[24,4800,46.4],[25,5000,47.8],[26,5200,49.2],[27,5400,50.5],[28,5600,51.8],[29,5800,53.1],[30,6000,54.4],[31,6200,55.7],[32,6400,57],[33,6600,58.3],[34,6800,59.5],[35,7000,60.7],[36,7200,61.9],[37,7400,63.2],[38,7600,64.5],[39,7800,65.8],[40,8000,67],[41,8200,68.2],[42,8400,69.3],[43,8600,70.4],[44,8800,71.6],[45,9000,72.9],[46,9200,74.2],[47,9400,75.5],[48,9600,76.7],[49,9800,77.8],[50,10000,78.9],[51,10200,80.1],[52,10400,81.3],[53,10600,82.5],[54,10800,83.7],[55,11000,84.9],[56,11200,86.1],[57,11400,87.3],[58,11600,88.4],[59,11800,89.5],[60,12000,90.7],[61,12200,91.9],[62,12400,93],[63,12600,94.1],[64,12800,95.2],[65,13000,96.3],[66,13200,97.4],[67,13400,98.5],[68,13600,99.6],[69,13800,100.7],[70,14000,101.8],[71,14200,102.9],[72,14400,104],[73,14600,105.1],[74,14800,106.2],[75,15000,107.3],[76,15200,108.4],[77,15400,109.5],[78,15600,110.7],[79,15800,111.9],[80,16000,113.1],[81,16200,114.2],[82,16400,115.3],[83,16600,116.5],[84,16800,117.6],[85,17000,118.7],[86,17200,119.9],[87,17400,121],[88,17600,122.2],[89,17800,123.3],[90,18000,124.4],[91,18200,125.5],[92,18400,126.7],[93,18600,127.8],[94,18800,128.9],[95,19000,130.1],[96,19200,131.3],[97,19400,132.5],[98,19600,133.6],[99,19800,134.7],[100,20000,135.8],[101,20200,137],[102,20400,138.2],[103,20600,139.3],[104,20800,140.4],[105,21000,141.5],[106,21200,142.6],[107,21400,143.8],[108,21600,144.9],[109,21800,146.1],[110,22000,147.2],[111,22200,148.3],[112,22400,149.5],[113,22600,150.7],[114,22800,151.9],[115,23000,153],[116,23200,154.2],[117,23400,155.4],[118,23600,156.5],[119,23800,157.7],[120,24000,158.8],[121,24200,159.9],[122,24400,161.1],[123,24600,162.4],[124,24800,163.6],[125,25000,164.9],[126,25200,166.2],[127,25400,167.5],[128,25600,168.8],[129,25800,170.1],[130,26000,171.4],[131,26200,172.7],[132,26400,174],[133,26600,175.3],[134,26800,176.5],[135,27000,177.8],[136,27200,179.1],[137,27400,180.4],[138,27600,181.7],[139,27800,183],[140,28000,184.3],[141,28200,185.6],[142,28400,186.8],[143,28600,188.1],[144,28800,190.1],[145,29000,191.5],[146,29200,193],[147,29400,194.4],[148,29600,195.7],[149,29800,197.1],[150,30000,198.8]];
    const TANKS=[{id:"T1",label:"T1",fuel:"G95",capacity:10000,color:"#22c55e",light:"#dcfce7",maxLevel:78.9},{id:"T2",label:"T2",fuel:"E20",capacity:10000,color:"#f59e0b",light:"#fef9c3",maxLevel:78.9},{id:"T3",label:"T3",fuel:"B20",capacity:10000,color:"#3b82f6",light:"#dbeafe",maxLevel:78.9},{id:"T4",label:"T4",fuel:"D",capacity:30000,color:"#ef4444",light:"#fee2e2",maxLevel:198.8}];
    const state={volumes:{T1:null,T2:null,T3:null,T4:null},errors:{T1:false,T2:false,T3:false,T4:false},calculated:false,animated:false,timer:null};
    const tankList=document.getElementById("tankList"),chartPanel=document.getElementById("chartPanel"),bars=document.getElementById("bars"),summary=document.getElementById("summary"),totalVolEl=document.getElementById("totalVol"),totalCapEl=document.getElementById("totalCap"),totalPctEl=document.getElementById("totalPct"),summaryFill=document.getElementById("summaryFill"),summaryGrid=document.getElementById("summaryGrid"),maxScale=30000;
    const fmt=n=>n.toLocaleString("th-TH");
    const pct=(v,c)=>Math.min(100,v/c*100);
    function interpolate(level){if(level<=0)return 0;if(level>=198.8)return 30000;const exact=TABLE.find(r=>Math.abs(r[2]-level)<.001);if(exact)return exact[1];for(let i=0;i<TABLE.length-1;i++){if(TABLE[i][2]<=level&&TABLE[i+1][2]>=level){const ratio=(level-TABLE[i][2])/(TABLE[i+1][2]-TABLE[i][2]);return Math.round(TABLE[i][1]+ratio*(TABLE[i+1][1]-TABLE[i][1]))}}return 0}
    function status(p){if(p>=70)return{label:"ปกติ",bg:"#dcfce7",text:"#15803d"};if(p>=30)return{label:"กลาง",bg:"#fef9c3",text:"#a16207"};return{label:"ต่ำ",bg:"#fee2e2",text:"#b91c1c"}}
    function anyResult(){return Object.values(state.volumes).some(v=>v!==null)}
    function renderInputs(){const old={};TANKS.forEach(t=>{const el=document.getElementById(`input-${t.id}`);old[t.id]=el?el.value:""});tankList.innerHTML=TANKS.map(t=>{const v=state.volumes[t.id],err=state.errors[t.id];return `<article class="tank-card ${err?"error":""}" data-tank="${t.id}"><div class="tank-badge" style="background:${t.light}"><span class="tank-label" style="color:${t.color}">${t.label}</span><span class="fuel-label" style="color:${t.color}">${t.fuel}</span></div><div class="tank-info"><div class="tank-meta">ความจุ ${fmt(t.capacity)} ลิตร · ระดับสูงสุด ${t.maxLevel} ซ.ม.</div><div class="input-row"><input id="input-${t.id}" type="number" inputmode="decimal" placeholder="0.0" min="0" max="${t.maxLevel}" step="0.1" value="${old[t.id]||""}" aria-label="ระดับน้ำมัน ${t.label}"><span class="unit">ซ.ม.</span></div>${err?`<div class="error-text">ค่าต้องอยู่ระหว่าง 0 - ${t.maxLevel}</div>`:""}</div>${v!==null?`<div class="inline-result"><div class="inline-liters" style="color:${t.color}">${fmt(v)}</div><div class="inline-unit">ลิตร</div></div>`:""}</article>`}).join("");TANKS.forEach(t=>{const input=document.getElementById(`input-${t.id}`);input.addEventListener("input",()=>{state.errors[t.id]=false;const card=document.querySelector(`[data-tank="${t.id}"]`);card.classList.remove("error");const errorText=card.querySelector(".error-text");if(errorText)errorText.remove()});input.addEventListener("keydown",e=>{if(e.key==="Enter")calculate()})})}
    function renderResults(){const show=state.calculated&&anyResult();chartPanel.classList.toggle("visible",show);summary.classList.toggle("visible",show);if(!show){bars.innerHTML="";summaryGrid.innerHTML="";return}bars.innerHTML=TANKS.map(t=>{const v=state.volumes[t.id];if(v===null)return"";const p=pct(v,t.capacity),barPct=v/maxScale*100,s=status(p),label=barPct>12&&v>0?`${p.toFixed(0)}%`:"";return `<div><div class="bar-head"><div class="bar-name"><span class="color-dot" style="background:${t.color}"></span><span class="tank-name">${t.label} (${t.fuel})</span><span class="status" style="background:${s.bg};color:${s.text}">${s.label}</span></div><div class="bar-value"><span class="bar-liters" style="color:${t.color}">${fmt(v)}</span><span class="unit"> ลิตร</span></div></div><div class="bar-track"><div class="capacity-marker" style="left:${t.capacity/maxScale*100}%"></div><div class="bar-fill" style="background:${t.color};width:${state.animated?barPct:0}%;min-width:${v>0?"36px":"0"}">${label}</div></div><div class="bar-foot"><span>0</span><span>ความจุ ${fmt(t.capacity)} ลิตร (${p.toFixed(1)}%)</span></div></div>`}).join("");const total=Object.values(state.volumes).reduce((s,v)=>s+(v||0),0),cap=TANKS.reduce((s,t)=>s+t.capacity,0),totalP=pct(total,cap);totalVolEl.textContent=fmt(total);totalCapEl.textContent=`ความจุรวม ${fmt(cap)} ลิตร`;totalPctEl.textContent=`${totalP.toFixed(1)}%`;summaryFill.style.width=state.animated?`${totalP.toFixed(1)}%`:"0%";summaryGrid.innerHTML=TANKS.map(t=>{const v=state.volumes[t.id];if(v===null)return"";return `<div class="summary-tank"><div class="summary-tank-label">${t.label} · ${t.fuel}</div><div class="summary-tank-value">${fmt(v)} ลิตร</div><div class="summary-tank-percent">${pct(v,t.capacity).toFixed(0)}% ของถัง</div></div>`}).join("")}
    function calculate(){const vols={},errs={};let hasError=false,allEmpty=true;TANKS.forEach(t=>{const raw=document.getElementById(`input-${t.id}`).value;if(raw===""){vols[t.id]=null;errs[t.id]=false;return}allEmpty=false;const lv=parseFloat(raw);if(Number.isNaN(lv)||lv<0||lv>t.maxLevel){errs[t.id]=true;vols[t.id]=null;hasError=true}else{errs[t.id]=false;vols[t.id]=interpolate(lv)}});state.volumes=vols;state.errors=errs;state.animated=false;if(!hasError&&!allEmpty){state.calculated=true;clearTimeout(state.timer);state.timer=setTimeout(()=>{state.animated=true;renderResults()},50)}renderInputs();renderResults()}
    function reset(){state.volumes={T1:null,T2:null,T3:null,T4:null};state.errors={T1:false,T2:false,T3:false,T4:false};state.calculated=false;state.animated=false;clearTimeout(state.timer);renderInputs();renderResults()}
    document.getElementById("calculateBtn").addEventListener("click",calculate);
    document.getElementById("resetBtn").addEventListener("click",reset);
    renderInputs();
  </script>
</body>
</html>
